{% extends "base.html" %}
{% block title %}Create Coupon{% endblock %}

{% block content %}
<div class="p-6 max-w-lg">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-xl font-bold text-gray-900">Create Discount Coupon</h1>
    <a href="{% url 'ecom:coupon_list' %}" class="text-sm text-gray-500"><i class="fas fa-arrow-left mr-1"></i>Back</a>
  </div>

  {% include 'includes/toast.html' %}

  <form method="post" class="bg-white border border-gray-200 rounded-lg p-6 space-y-5">
    {% csrf_token %}

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Coupon Code <span class="text-red-500">*</span></label>
      <input type="text" name="code" class="w-full border border-gray-300 rounded px-3 py-2 text-sm uppercase focus:outline-none focus:ring-1 focus:ring-green-500" placeholder="e.g. SAVE20" required>
      <p class="text-xs text-gray-400 mt-1">Will be stored in uppercase. Customers enter this at checkout.</p>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Discount Type</label>
        <select name="discount_type" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-green-500">
          {% for val, label in discount_types %}
            <option value="{{ val }}">{{ label }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Value <span class="text-red-500">*</span></label>
        <input type="number" name="value" min="0" step="0.01" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-green-500" placeholder="e.g. 20" required>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Min Order Amount (Rs.)</label>
        <input type="number" name="min_order_amount" min="0" step="0.01" value="0" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-green-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Max Uses</label>
        <input type="number" name="max_uses" min="1" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-green-500" placeholder="Leave blank = unlimited">
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Valid From</label>
        <input type="text" name="valid_from" class="flatpickr w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-green-500" placeholder="YYYY-MM-DD" autocomplete="off">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Valid Until</label>
        <input type="text" name="valid_until" class="flatpickr w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-green-500" placeholder="YYYY-MM-DD" autocomplete="off">
      </div>
    </div>

    <div class="flex gap-3 pt-2">
      <button type="submit" class="px-5 py-2 bg-green-700 text-white text-sm font-semibold rounded hover:bg-green-800">
        Create Coupon
      </button>
      <a href="{% url 'ecom:coupon_list' %}" class="px-5 py-2 border border-gray-300 text-sm text-gray-600 rounded hover:bg-gray-50">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
