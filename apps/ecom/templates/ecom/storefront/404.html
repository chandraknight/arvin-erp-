{% extends "ecom/storefront/base.html" %}
{% load static %}

{% block page_title %}Page Not Found{% endblock %}

{% block content %}
<section class="mb-60">
  <div class="container">
    <div class="text-center" style="padding:60px 0;">
      <h1 style="font-size:8rem;font-weight:900;color:#3730a3;line-height:1;">404</h1>
      <h3 class="color-brand-3 mb-15">Page Not Found</h3>
      <p class="font-md color-gray-500 mb-30">The page you're looking for doesn't exist or has been moved.</p>
      <a href="{% url 'ecom:home' %}" class="btn btn-brand-2 mr-10">Go Home</a>
      <a href="{% url 'ecom:product_list' %}" class="btn btn-cart">Browse Products</a>
    </div>
  </div>
</section>
{% endblock %}
