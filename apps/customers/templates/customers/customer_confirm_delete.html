<div style="
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
">
    <div style="
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
    "></div>

    <div style="
        background-color: rgba(255, 255, 255, 0.8);
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        max-width: 500px;
        width: 90%;
        border: 1px solid rgba(255, 255, 255, 0.2);
        position: relative;
    ">
        <h2 style="font-size: 1.5rem; font-weight: 600; margin-bottom: 1rem; color: #333;">{{ title }}</h2>
        <p style="margin-bottom: 1.5rem; color: #555;">{{ message }}</p>

        <form method="POST" style="display: flex; gap: 1rem;">
            {% csrf_token %}
            <button type="submit" style="
                background-color: #dc3545;
                color: white;
                padding: 0.5rem 1rem;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                backdrop-filter: blur(5px);
            ">Confirm Delete</button>
            <a href="{% url back_url %}" style="
                background-color: rgba(108, 117, 125, 0.8);
                color: white;
                padding: 0.5rem 1rem;
                border-radius: 6px;
                text-decoration: none;
                text-align: center;
                backdrop-filter: blur(5px);
            ">Cancel</a>
        </form>
    </div>
</div>
