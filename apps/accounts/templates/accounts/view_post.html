{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <title>View Post</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="{% static 'css/no-rounded.css' %}" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 border border-gray-200 shadow-sm w-full max-w-md text-center">
        <h1 class="text-2xl font-bold mb-4 text-gray-800">View Post</h1>
        <p class="text-gray-700 mb-6">{{ message }}</p>
        <a href="{% url 'user_dashboard' %}"
           class="inline-flex items-center gap-2 bg-gray-600 hover:bg-gray-700 text-white text-sm font-semibold px-5 py-3 shadow transition duration-150">
            <i class="fas fa-arrow-left text-xs"></i> Back to Dashboard
        </a>
    </div>
</body>
</html>
