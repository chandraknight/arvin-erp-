{% extends "base.html" %}
{% block title %}Password Changed{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto px-4 py-8">

  <div class="mb-6">
    <h1 class="text-xl font-bold text-gray-900 flex items-center gap-2">
      <i class="fas fa-lock text-green-600"></i>
      Change Password
    </h1>
  </div>

  <div class="bg-white border border-gray-200 shadow-sm overflow-hidden">
    <div class="h-1 w-full" style="background: linear-gradient(to right, #16a34a, #0d9488);"></div>

    <div class="px-8 py-12 text-center">
      <div class="w-20 h-20 flex items-center justify-center mx-auto mb-5"
           style="border-radius:50%; background:#f0fdf4; border:4px solid #bbf7d0;">
        <i class="fas fa-check-circle text-green-500" style="font-size:2.5rem;"></i>
      </div>
      <h2 class="text-xl font-bold text-gray-900 mb-2">Password Updated Successfully</h2>
      <p class="text-gray-500 text-sm mb-8 max-w-xs mx-auto leading-relaxed">
        Your password has been changed. You're still logged in and can continue working.
      </p>
      <a href="{% url 'accounts:user_dashboard' %}"
         class="inline-flex items-center justify-center gap-2 bg-green-600 hover:bg-green-700 text-white font-semibold px-8 py-2.5 transition shadow-sm"
         style="background-color:#277a4c; color:#fff;">
        <i class="fas fa-tachometer-alt" style="font-size:12px; color:#fff;"></i>
        Back to Dashboard
      </a>
    </div>
  </div>

</div>
{% endblock %}
