{% extends 'login_base.html' %}
{% block title %}Check Your Email{% endblock %}
{% block content %}
<div class="flex w-full min-h-screen items-center justify-center bg-gray-50">
  <div class="w-full max-w-md bg-white rounded-xl shadow-md px-8 py-10 text-center">
    <div class="text-indigo-500 text-5xl mb-4">✉</div>
    <h1 class="text-2xl font-bold text-gray-800 mb-2">Check Your Email</h1>
    <p class="text-gray-500 mb-6">
      If an account exists for that email, a password reset link has been sent.<br>
      Check your inbox (and spam folder).
    </p>
    <a href="{% url 'accounts:login' %}" class="inline-block bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-6 rounded-lg transition">
      Back to Login
    </a>
  </div>
</div>
{% endblock %}
