<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body style="font-family:sans-serif;background:#f3f4f6;padding:32px 16px;">
  <div style="max-width:480px;margin:0 auto;background:#fff;border-radius:12px;padding:32px;box-shadow:0 2px 8px rgba(0,0,0,.08);">
    <h2 style="color:#1e1b4b;margin-top:0;">Reset Your Password</h2>
    <p style="color:#374151;">Hi {{ user.get_username }},</p>
    <p style="color:#374151;">We received a request to reset your password. Click the button below — this link expires in 24 hours.</p>
    <div style="text-align:center;margin:28px 0;">
      <a href="{{ protocol }}://{{ domain }}{% url 'accounts:password_reset_confirm' uidb64=uid token=token %}"
         style="background:#4f46e5;color:#fff;text-decoration:none;padding:12px 28px;border-radius:8px;font-weight:600;display:inline-block;">
        Reset Password
      </a>
    </div>
    <p style="color:#6b7280;font-size:13px;">If you didn't request this, ignore this email — your password won't change.</p>
    <hr style="border:none;border-top:1px solid #e5e7eb;margin:24px 0;">
    <p style="color:#9ca3af;font-size:12px;text-align:center;">{{ site_name }}</p>
  </div>
</body>
</html>
