{% extends 'login_base.html' %}
{% load crispy_forms_tags %}
{% block title %}Set Your Password{% endblock %}
{% block content %}
<div class="flex w-full min-h-screen items-center justify-center bg-gray-50">
  <div class="w-full max-w-md bg-white rounded-xl shadow-md px-8 py-10">
    <h1 class="text-2xl font-bold text-gray-800 mb-1">Set Your Password</h1>
    <p class="text-sm text-gray-500 mb-6">Welcome, <strong>{{ user_email }}</strong>. Choose a password to activate your account.</p>
    <form method="post">
      {% csrf_token %}
      {{ form|crispy }}
      <button type="submit" class="w-full mt-4 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg transition">
        Activate Account
      </button>
    </form>
  </div>
</div>
{% endblock %}
