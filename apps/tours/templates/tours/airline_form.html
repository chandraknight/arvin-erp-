{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="w-full mt-2">
  <div class="flex items-center gap-3 mb-6">
    <a href="{% url 'tours:airline_list' %}" class="text-gray-400 hover:text-gray-600 transition"><i class="fas fa-arrow-left"></i></a>
    <h2 class="text-2xl font-bold text-gray-800">{{ title }}</h2>
  </div>
  <form method="post" class="bg-white border border-gray-200 shadow-sm p-6 space-y-4">
    {% csrf_token %}
    {% for field in form %}
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
        {{ field }}
      </div>
    {% endfor %}
    <div class="flex gap-3 pt-2 border-t border-gray-100">
      <button type="submit" class="bg-green-600 hover:bg-green-700 text-white font-medium px-6 py-2 transition duration-150">Save</button>
      <a href="{% url 'tours:airline_list' %}" class="border border-gray-300 text-gray-700 hover:bg-gray-50 font-medium px-6 py-2 transition duration-150">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
