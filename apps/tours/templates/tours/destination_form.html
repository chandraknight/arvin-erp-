{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="w-full mt-2">

  <div class="flex items-center gap-3 mb-6">
    <a href="{% url 'tours:destination_list' %}" class="text-gray-400 hover:text-gray-600 transition">
      <i class="fas fa-arrow-left"></i>
    </a>
    <h2 class="text-2xl font-bold text-gray-800">{{ title }}</h2>
  </div>

  <form method="post" class="bg-white border border-gray-200 shadow-sm p-6 space-y-4">
    {% csrf_token %}
    {% if form.errors %}
      <div class="bg-red-50 border border-red-200 p-4 text-sm text-red-700">Please correct the errors below.</div>
    {% endif %}

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Destination Name <span class="text-red-500">*</span></label>
      {{ form.name }}
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Country <span class="text-red-500">*</span></label>
      {{ form.country }}
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
      {{ form.description }}
    </div>
    <div class="flex items-center gap-2">
      {{ form.is_active }}
      <label class="text-sm font-medium text-gray-700">Active</label>
    </div>

    <div class="flex gap-3 pt-2 border-t border-gray-100">
      <button type="submit" class="bg-green-600 hover:bg-green-700 text-white font-medium px-6 py-2 transition duration-150">Save</button>
      <a href="{% url 'tours:destination_list' %}" class="border border-gray-300 text-gray-700 hover:bg-gray-50 font-medium px-6 py-2 transition duration-150">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
