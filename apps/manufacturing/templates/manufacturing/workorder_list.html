{% extends 'base.html' %}
{% load humanize %}
{% block title %}Work Orders{% endblock %}
{% block content %}
{% include 'includes/toast.html' %}
<div class="w-full mt-2">
    <div class="flex justify-between items-center mb-6 border-b pb-4">
        <div>
            <h1 class="text-2xl font-bold text-gray-800">Work Orders</h1>
            <p class="text-sm text-gray-500 mt-1">Track production orders and planned quantities.</p>
        </div>
        <a href="{% url 'manufacturing:workorder_create' %}" class="inline-flex items-center gap-2 px-5 py-2 text-sm font-semibold bg-green-600 text-white hover:bg-green-700 transition shadow"><i class="fas fa-plus"></i> New Work Order</a>
    </div>

    <div class="bg-white border border-gray-200 shadow-sm p-4 mb-4">
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
            <input type="text" name="q" value="{{ q }}" placeholder="Search WO # or product…" class="w-full border border-gray-300 px-3 py-2 text-sm focus:ring-2 focus:ring-green-600">
            <select name="status" class="border border-gray-300 px-3 py-2 text-sm bg-white focus:ring-2 focus:ring-green-600">
                <option value="">All Statuses</option>
                <option value="DRAFT" {% if status == 'DRAFT' %}selected{% endif %}>Draft</option>
                <option value="PLANNED" {% if status == 'PLANNED' %}selected{% endif %}>Planned</option>
                <option value="IN_PROGRESS" {% if status == 'IN_PROGRESS' %}selected{% endif %}>In Progress</option>
                <option value="COMPLETED" {% if status == 'COMPLETED' %}selected{% endif %}>Completed</option>
                <option value="CANCELLED" {% if status == 'CANCELLED' %}selected{% endif %}>Cancelled</option>
            </select>
        </div>
    </div>

    <div id="workorder-list-container">
        {% include 'manufacturing/partials/workorder_table.html' %}
    </div>
</div>
{% endblock %}
