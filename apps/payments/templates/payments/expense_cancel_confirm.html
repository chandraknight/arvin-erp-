{% extends 'base.html' %}

{% block title %}Cancel Expense{% endblock %}

{% block content %}
<div class="w-full mt-3 max-w-lg mx-auto">
  <div class="bg-white border border-gray-200 shadow-sm p-6">
    <h2 class="text-xl font-bold text-gray-800 mb-2">Cancel Expense</h2>
    <p class="text-sm text-gray-600 mb-5">
      Are you sure you want to cancel <strong>"{{ expense.title }}"</strong>
      (₹ {{ expense.amount }})? A reversing journal entry will be posted automatically.
    </p>
    <div class="flex gap-3">
      <form method="post" class="flex-1">
        {% csrf_token %}
        <button type="submit"
                class="w-full bg-red-500 hover:bg-red-600 text-white font-semibold py-2.5 transition">
          Yes, Cancel Expense
        </button>
      </form>
      <a href="{% url 'payments:expense_detail' expense.pk %}"
         class="flex-1 text-center border border-gray-300 text-gray-700 font-semibold py-2.5 hover:bg-gray-50 transition">
        No, Go Back
      </a>
    </div>
  </div>
</div>
{% endblock %}
