{% extends 'base.html' %}
{% load humanize %}
{% block title %}Sales Orders{% endblock %}
{% block content %}
{% include 'includes/toast.html' %}
<div class="w-full mt-2">
    <div class="flex justify-between items-center mb-6 border-b pb-4">
        <h1 class="text-2xl font-bold text-gray-800">Sales Orders</h1>
        <a href="{% url 'orders:order_create' %}" class="inline-flex items-center gap-2 px-5 py-2 text-sm font-semibold bg-green-600 text-white hover:bg-green-700 transition shadow"><i class="fas fa-plus"></i> New Order</a>
    </div>
    <!-- Search + filter -->
    <div class="bg-white border border-gray-200 shadow-sm p-4 mb-4" x-data="{loading:false}" @htmx:before-request.window="loading=true" @htmx:after-request.window="loading=false">
        <div class="flex flex-col sm:flex-row gap-3">
            <div class="relative flex-1">
                <input type="text" name="q" value="{{ q }}" placeholder="Search order # or customer…"
                       class="w-full border border-gray-300 px-3 py-2 pr-9 text-sm focus:ring-2 focus:ring-green-600"
                       hx-get="{% url 'orders:order_list' %}" hx-target="#order-list-container" hx-swap="innerHTML"
                       hx-trigger="input changed delay:400ms" hx-include="[data-filter]" hx-push-url="true" autocomplete="off">
                <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none">
                    <i class="fas fa-search text-gray-400 text-xs" x-show="!loading"></i>
                    <i class="fas fa-spinner fa-spin text-green-600 text-xs" x-show="loading" style="display:none"></i>
                </div>
            </div>
            <select name="status" data-filter class="border border-gray-300 px-3 py-2 text-sm bg-white focus:ring-2 focus:ring-green-600"
                    hx-get="{% url 'orders:order_list' %}" hx-target="#order-list-container" hx-swap="innerHTML" hx-trigger="change" hx-include="[name='q']" hx-push-url="true">
                <option value="">All Statuses</option>
                {% for val, label in order.status.field.choices|default:"" %}{% endfor %}
                <option value="DRAFT" {% if status == 'DRAFT' %}selected{% endif %}>Draft</option>
                <option value="CONFIRMED" {% if status == 'CONFIRMED' %}selected{% endif %}>Confirmed</option>
                <option value="PROCESSING" {% if status == 'PROCESSING' %}selected{% endif %}>Processing</option>
                <option value="DISPATCHED" {% if status == 'DISPATCHED' %}selected{% endif %}>Dispatched</option>
                <option value="DELIVERED" {% if status == 'DELIVERED' %}selected{% endif %}>Delivered</option>
                <option value="CANCELLED" {% if status == 'CANCELLED' %}selected{% endif %}>Cancelled</option>
            </select>
        </div>
    </div>
    <div id="order-list-container">
        {% include 'orders/partials/order_table.html' %}
    </div>
</div>
{% endblock %}
