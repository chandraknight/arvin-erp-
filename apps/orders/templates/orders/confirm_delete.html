{% extends 'base.html' %}
{% block title %}Confirm Delete{% endblock %}
{% block content %}
<div class="w-full mt-2 bg-white border border-gray-200 shadow-sm p-8">
    <h1 class="text-xl font-bold text-gray-800 mb-4">Confirm Delete</h1>
    <p class="text-gray-600 mb-6">Delete <strong>{{ object }}</strong>? This cannot be undone.</p>
    <form method="post">
        {% csrf_token %}
        <div class="flex gap-3">
            <button type="submit" class="px-6 py-2 bg-red-600 text-white font-semibold hover:bg-red-700 transition">Delete</button>
            <a href="javascript:history.back()" class="px-6 py-2 bg-gray-200 text-gray-700 hover:bg-gray-300 transition">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
