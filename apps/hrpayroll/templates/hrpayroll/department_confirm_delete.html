{% extends 'base.html' %}

{% block title %}Confirm Delete Department{% endblock %}

{% block content %}
<div class="w-full mt-2">
    <h1 class="text-3xl font-bold text-gray-800 mb-6">Delete Department</h1>

    <div class="bg-white shadow-md rounded-lg p-6 mb-8">
        <p class="text-gray-700 text-lg mb-4">
            Are you sure you want to delete the department "<span class="font-semibold text-red-600">{{ department.name }}</span>"?
        </p>
        <p class="text-red-500 mb-6">This action cannot be undone.</p>

        <form method="post">
            {% csrf_token %}
            <button type="submit" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded">
                Confirm Delete
            </button>
            <a href="{% url 'hrpayroll:department_list' %}" class="ml-4 bg-gray-500 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded">
                Cancel
            </a>
        </form>
    </div>
</div>
{% endblock %}
