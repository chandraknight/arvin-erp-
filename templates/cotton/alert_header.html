<div class="bg-yellow-50 border-l-4 border-yellow-400 p-6 mb-8">
    <div class="flex">
        <div class="flex-shrink-0">
            <svg class="h-6 w-6 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
            </svg>
        </div>
        <div class="ml-3">
            <h3 class="text-base font-semibold text-yellow-800">{{ header }}</h3>
            <div class="mt-2 text-sm text-yellow-700">
                <ul class="list-disc list-inside space-y-1">
                    {% for product in low_stock_products %}
                        <li>
                            <span class="font-semibold">{{ product.name }}</span>:
                            Current Stock is {{ product.productstock.stock }} (Minimum: {{ product.productstock.minimum_stock }}) —
                            <a href="{% url 'products:update_stock' product.id %}" class="text-blue-700 hover:text-blue-900 font-medium">Update Stock</a>
                        </li>
                    {% endfor %}
                </ul>
            </div>
        </div>
    </div>
</div>
